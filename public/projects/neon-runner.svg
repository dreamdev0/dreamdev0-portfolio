<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ng1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c2e7" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#74c7ec" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="ng2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e" stop-opacity="0" />
      <stop offset="100%" stop-color="#313244" stop-opacity="0.7" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="#181825" />
  <!-- Perspective grid floor -->
  <g stroke="#74c7ec" stroke-width="1" opacity="0.5">
    <line x1="0" y1="280" x2="640" y2="280" />
    <line x1="0" y1="320" x2="640" y2="320" />
    <line x1="0" y1="340" x2="640" y2="340" />
    <line x1="80" y1="360" x2="320" y2="200" />
    <line x1="200" y1="360" x2="320" y2="200" />
    <line x1="320" y1="360" x2="320" y2="200" />
    <line x1="440" y1="360" x2="320" y2="200" />
    <line x1="560" y1="360" x2="320" y2="200" />
  </g>
  <rect width="640" height="360" fill="url(#ng2)" />
  <ellipse cx="320" cy="120" rx="200" ry="80" fill="url(#ng1)" />
  <g transform="translate(180 100)" font-family="ui-monospace, monospace" font-weight="700">
    <text x="140" y="100" text-anchor="middle" fill="#f5c2e7" font-size="56">NEO/RUN</text>
    <text x="140" y="130" text-anchor="middle" fill="#cdd6f4" font-size="12" letter-spacing="4">NEON RUNNER</text>
  </g>
</svg>
